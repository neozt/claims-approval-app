<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claims Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
      [x-cloak] { display: none !important; }
      .loading-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.7);
        display: flex; justify-content: center; align-items: center;
        z-index: 1000;
      }
    </style>
  </head>
  <body class="bg-light">
    <div class="container py-5" x-data="claimsPortal()" x-init="fetchClaims()" x-cloak>
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Pending Claims Approval</h1>
        <button class="btn btn-outline-primary btn-sm" @click="fetchClaims()">Refresh List</button>
      </div>

      <!-- Loading State -->
      <div class="loading-overlay" x-show="loading">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>

      <!-- Error Alert -->
      <div class="alert alert-danger" role="alert" x-show="error" x-text="error" @click="error = null" style="cursor: pointer;"></div>

      <!-- Claims Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>Claim ID</th>
                  <th>Amount</th>
                  <th>Description</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody>
                <template x-if="claims.length === 0">
                  <tr>
                    <td colspan="4" class="text-center py-4 text-muted">No pending claims found.</td>
                  </tr>
                </template>
                <template x-for="claim in claims" :key="claim.claimId">
                  <tr>
                    <td class="align-middle fw-bold" x-text="claim.claimId"></td>
                    <td class="align-middle" x-text="'$' + claim.amount"></td>
                    <td class="align-middle text-truncate" style="max-width: 300px;" x-text="claim.description"></td>
                    <td class="text-end px-3">
                      <button class="btn btn-success btn-sm me-2" @click="handleAction('approve', claim.claimId)">Approve</button>
                      <button class="btn btn-danger btn-sm" @click="handleAction('reject', claim.claimId)">Reject</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      function claimsPortal() {
        return {
          claims: [],
          loading: false,
          error: null,
          apiUrl: '${ClaimsApiUrl}',

          async fetchClaims() {
            this.loading = true;
            this.error = null;
            try {
              const response = await fetch(`${this.apiUrl}/claims/pending-claims`);
              if (!response.ok) throw new Error('Failed to fetch claims');
              this.claims = await response.json();
            } catch (err) {
              this.error = 'Error fetching claims: ' + err.message;
              console.error(err);
            } finally {
              this.loading = false;
            }
          },

          async handleAction(action, claimId) {
            if (!confirm(`Are you sure you want to ${action} claim ${claimId}?`)) return;
            
            this.loading = true;
            this.error = null;
            try {
              const response = await fetch(`${this.apiUrl}/claims/${action}/${claimId}`, {
                method: 'POST'
              });
              
              if (!response.ok) {
                const data = await response.json();
                throw new Error(data.message || `Failed to ${action} claim`);
              }
              
              // Refresh the list
              await this.fetchClaims();
            } catch (err) {
              this.error = `Error performing ${action}: ` + err.message;
              console.error(err);
              this.loading = false;
            }
          }
        }
      }
    </script>
  </body>
</html>
